<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Stack Academy</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="Create your Stack Academy account and start your coding journey today.">
    <meta name="keywords" content="Register, Sign Up, Create Account, Stack Academy">
    <meta name="author" content="Stack Academy">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/favicon.png">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #E47C9C;
            --primary-dark: #C65A80;
            --accent: #908DCE;
            --dark: #2C3E50;
            --gray: #6c757d;
            --light-bg: #f8f9fa;
        }

        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #E47C9C, #908DCE);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        /* Premium glass card */
        .register-wrapper {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 24px;
            width: 860px;
            max-width: 95%;
            display: flex;
            gap: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }

        /* Left side - Logo with subtle animation */
        .register-left {
            flex: 1;
            background: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.03);
        }

        .register-left img {
            max-width: 80%;
            transition: transform 0.4s ease;
        }

        .register-left img:hover {
            transform: scale(1.05);
        }

        /* Right side - Clean white card */
        .register-right {
            flex: 1.2;
            background: white;
            border-radius: 18px;
            padding: 22px 22px 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Heading */
        .register-right h3 {
            text-align: center;
            margin: 0 0 12px 0;
            color: var(--accent);
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 0.5px;
            position: relative;
        }

        .register-right h3:after {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            margin: 8px auto 0;
            border-radius: 2px;
        }

        /* Compact form groups */
        .form-group-custom {
            margin-bottom: 10px;
        }

        .form-label {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 2px;
            color: var(--dark);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* Sleek inputs */
        .register-right .input-group {
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .register-right .input-group-text {
            background: var(--light-bg);
            border: 1px solid #e9ecef;
            border-right: none;
            padding: 8px 12px;
            font-size: 13px;
            color: var(--primary);
        }

        .register-right .form-control {
            border: 1px solid #e9ecef;
            border-left: none;
            border-radius: 0 14px 14px 0;
            font-size: 13px;
            padding: 8px 12px;
            background: white;
            transition: all 0.2s ease;
        }

        .register-right .form-control:focus {
            border-color: var(--primary);
            box-shadow: none;
            background: white;
        }

        /* Password toggle icon */
        .password-toggle-icon {
            background: var(--light-bg);
            border: 1px solid #e9ecef;
            border-left: none;
            cursor: pointer;
            color: var(--gray);
            padding: 8px 12px;
            transition: color 0.2s ease;
        }

        .password-toggle-icon:hover {
            color: var(--primary);
        }

        /* Password strength - ultra compact */
        .password-strength {
            margin-top: 4px;
            padding: 0 2px;
        }

        .strength-bar {
            height: 3px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
        }

        .strength-bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        #strengthText {
            font-size: 10px;
            margin-top: 2px;
            display: block;
        }

        /* Error messages - tiny */
        .invalid-feedback {
            font-size: 10px;
            margin-top: 2px;
        }

        #passwordMatch {
            font-size: 10px;
            margin-top: 2px;
            display: block;
        }

        /* Terms checkbox */
        .terms-check {
            margin: 8px 0 10px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .terms-check input {
            width: 14px;
            height: 14px;
            accent-color: var(--primary);
            margin: 0;
        }

        .terms-check a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .terms-check a:hover {
            text-decoration: underline;
        }

        /* Premium button */
        .register-btn {
            width: 100%;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 10px;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            margin: 2px 0 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(228, 124, 156, 0.3);
        }

        .register-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(228, 124, 156, 0.4);
        }

        .register-btn:active {
            transform: translateY(0);
        }

        .register-btn:disabled {
            opacity: 0.6;
        }

        /* Footer */
        .register-footer {
            text-align: center;
            font-size: 11px;
            color: var(--gray);
        }

        .register-footer a {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
        }

        .register-footer a:hover {
            color: var(--primary);
        }

        /* OR divider - minimalist */
        .or-divider {
            text-align: center;
            position: relative;
            margin: 8px 0;
        }

        .or-divider::before,
        .or-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #e9ecef;
        }

        .or-divider::before { left: 0; }
        .or-divider::after { right: 0; }

        .or-divider span {
            background: white;
            padding: 0 8px;
            color: var(--gray);
            font-size: 10px;
        }

        /* Social login - premium spacing */
        .social-login {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            margin-bottom: 2px;
        }

        .social-login-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .social-login-btn.google { background: #DB4437; }
        .social-login-btn.facebook { background: #4267B2; }
        .social-login-btn.github { background: #333; }

        .social-login-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        /* Alert messages - compact */
        .alert {
            font-size: 11px;
            padding: 6px 10px;
            border-radius: 30px;
            margin-bottom: 10px;
            border: none;
        }

        .alert-info {
            background: #e7f3ff;
            color: #0a4b78;
        }

        /* Remove row extra spacing */
        .row {
            margin: 0 -4px;
        }

        .col-md-6 {
            padding: 0 4px;
        }

        /* No scroll needed */
        .register-right {
            max-height: none;
            overflow: visible;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .register-wrapper {
                flex-direction: column;
                padding: 15px;
            }

            .register-left {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .register-wrapper {
                padding: 12px;
            }
            
            .register-right {
                padding: 18px 15px;
            }
            
            .social-login {
                gap: 15px;
            }
        }
    </style>
</head>
<body>

<div class="register-wrapper">
    <!-- Left side - Logo -->
    <div class="register-left">
        <img src="images/logo.png" alt="Stack Academy Logo">
    </div>

    <!-- Right side - Registration Form -->
    <div class="register-right">
        <h3>CREATE ACCOUNT</h3>

        <!-- Message container -->
        <div id="messageContainer"></div>

      

        <form class="register-form" id="registerForm">
            <div class="row">
                <div class="col-md-6 form-group-custom">
                    <label class="form-label">First Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" id="firstName" >
                    </div>
                    <div class="invalid-feedback" id="firstNameError"></div>
                </div>

                <div class="col-md-6 form-group-custom">
                    <label class="form-label">Last Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" id="lastName" >
                    </div>
                    <div class="invalid-feedback" id="lastNameError"></div>
                </div>
            </div>

            <div class="form-group-custom">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" id="email" >
                </div>
                <div class="invalid-feedback" id="emailError"></div>
            </div>

            <div class="form-group-custom">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="Create a password">
                    <span class="password-toggle-icon" onclick="togglePassword('password')">
                        <i class="fas fa-eye" id="togglePassword"></i>
                    </span>
                </div>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-bar-fill" id="strengthBar"></div>
                    </div>
                    <small id="strengthText">Password strength</small>
                </div>
                <div class="invalid-feedback" id="passwordError"></div>
            </div>

            <div class="form-group-custom">
                <label class="form-label">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password">
                    <span class="password-toggle-icon" onclick="togglePassword('confirmPassword')">
                        <i class="fas fa-eye" id="toggleConfirmPassword"></i>
                    </span>
                </div>
                <small id="passwordMatch" class="text-danger"></small>
            </div>

            <div class="terms-check">
                <input type="checkbox" id="terms" checked>
                <label for="terms">
                    I agree to <a href="#" onclick="showTerms()">Terms</a> & <a href="#" onclick="showPrivacy()">Privacy</a>
                </label>
            </div>

            <button type="submit" class="register-btn" id="registerBtn">
                Create Account <i class="fas fa-user-plus ms-2"></i>
            </button>
        </form>

        <div class="register-footer">
            Already have an account? <a href="login.html">Log in</a>

            <div class="or-divider">
                <span>OR</span>
            </div>

            <div class="social-login">
                <a href="#" class="social-login-btn google" onclick="socialSignup('google')">
                    <i class="fab fa-google"></i>
                </a>
                <a href="#" class="social-login-btn facebook" onclick="socialSignup('facebook')">
                    <i class="fab fa-facebook-f"></i>
                </a>
                <a href="#" class="social-login-btn github" onclick="socialSignup('github')">
                    <i class="fab fa-github"></i>
                </a>
            </div>
        </div>
    </div>
</div>

<script>
// API URL - Update this to match your backend URL
const API_URL = 'http://localhost:3000/api';

document.addEventListener("DOMContentLoaded", () => {
    checkAuthStatus();
    setupEventListeners();
});

function setupEventListeners() {
    const registerForm = document.getElementById('registerForm');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');

    registerForm.addEventListener('submit', handleRegister);
    passwordInput.addEventListener('input', checkPasswordStrength);
    confirmInput.addEventListener('input', checkPasswordMatch);

    ['firstName', 'lastName', 'email', 'password', 'confirmPassword'].forEach(fieldId => {
        document.getElementById(fieldId).addEventListener('input', () => clearFieldError(fieldId));
    });
}

async function checkAuthStatus() {
    const token = localStorage.getItem('token');
    if (token) {
        try {
            const response = await fetch(`${API_URL}/auth/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                window.location.href = 'dashboard.html';
            } else {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
            }
        } catch (error) {
            console.error('Auth check failed:', error);
        }
    }
}

function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    const toggleIcon = document.getElementById(fieldId === 'password' ? 'togglePassword' : 'toggleConfirmPassword');
    
    if (field.type === 'password') {
        field.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
    } else {
        field.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
    }
}

function checkPasswordStrength() {
    const password = document.getElementById('password').value;
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');
    
    let strength = 0;
    
    if (password.length >= 8) strength += 25;
    if (/[a-z]/.test(password)) strength += 25;
    if (/[A-Z]/.test(password)) strength += 25;
    if (/[0-9]|[$@#&!]/.test(password)) strength += 25;
    
    strengthBar.style.width = strength + '%';
    
    const colors = ['#dc3545', '#ffc107', '#17a2b8', '#28a745'];
    const texts = ['Weak', 'Fair', 'Good', 'Strong'];
    const index = strength <= 25 ? 0 : strength <= 50 ? 1 : strength <= 75 ? 2 : 3;
    
    strengthBar.style.background = colors[index];
    strengthText.textContent = password ? texts[index] + ' password' : 'Password strength';
}

function checkPasswordMatch() {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    const matchMsg = document.getElementById('passwordMatch');
    const registerBtn = document.getElementById('registerBtn');
    
    if (confirm && password !== confirm) {
        matchMsg.textContent = 'Passwords do not match';
        registerBtn.disabled = true;
    } else {
        matchMsg.textContent = '';
        registerBtn.disabled = false;
    }
}

async function handleRegister(e) {
    e.preventDefault();

    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const terms = document.getElementById('terms').checked;
    const registerBtn = document.getElementById('registerBtn');

    clearAllErrors();

    if (!validateForm(firstName, lastName, email, password, confirmPassword, terms)) {
        return;
    }

    registerBtn.disabled = true;
    registerBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Creating...';

    setTimeout(() => {
        const mockUser = {
            id: Date.now(),
            name: `${firstName} ${lastName}`,
            email: email,
            role: 'student'
        };
        const mockToken = 'demo-token-' + Date.now();
        
        localStorage.setItem('token', mockToken);
        localStorage.setItem('user', JSON.stringify(mockUser));

        showMessage('Account created!', 'success');
        
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 1000);
    }, 800);
}

function validateForm(firstName, lastName, email, password, confirmPassword, terms) {
    let isValid = true;

    if (!firstName) {
        showFieldError('firstName', 'Required');
        isValid = false;
    } else if (firstName.length < 2) {
        showFieldError('firstName', 'Min 2 chars');
        isValid = false;
    }

    if (!lastName) {
        showFieldError('lastName', 'Required');
        isValid = false;
    } else if (lastName.length < 2) {
        showFieldError('lastName', 'Min 2 chars');
        isValid = false;
    }

    if (!email) {
        showFieldError('email', 'Required');
        isValid = false;
    } else {
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
            showFieldError('email', 'Invalid email');
            isValid = false;
        }
    }

    if (!password) {
        showFieldError('password', 'Required');
        isValid = false;
    } else if (password.length < 6) {
        showFieldError('password', 'Min 6 chars');
        isValid = false;
    }

    if (password !== confirmPassword) {
        document.getElementById('passwordMatch').textContent = 'Passwords must match';
        isValid = false;
    }

    if (!terms) {
        showMessage('Please accept Terms & Privacy', 'error');
        isValid = false;
    }

    return isValid;
}

function showFieldError(fieldId, message) {
    const field = document.getElementById(fieldId);
    const errorDiv = document.getElementById(`${fieldId}Error`);
    
    if (field && errorDiv) {
        field.classList.add('is-invalid');
        errorDiv.textContent = message;
    }
}

function clearFieldError(fieldId) {
    const field = document.getElementById(fieldId);
    const errorDiv = document.getElementById(`${fieldId}Error`);
    
    if (field && errorDiv) {
        field.classList.remove('is-invalid');
        errorDiv.textContent = '';
    }
}

function clearAllErrors() {
    ['firstName', 'lastName', 'email', 'password'].forEach(clearFieldError);
    document.getElementById('passwordMatch').textContent = '';
    document.getElementById('messageContainer').innerHTML = '';
}

function showMessage(text, type) {
    const messageContainer = document.getElementById('messageContainer');
    const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
    
    messageContainer.innerHTML = `<div class="alert ${alertClass}">${text}</div>`;
    
    if (type === 'success') {
        setTimeout(() => { messageContainer.innerHTML = ''; }, 3000);
    }
}

function socialSignup(provider) {
    showMessage(`Signing up with ${provider}...`, 'info');
}

function showTerms() {
    showMessage('Terms of Service - Demo version', 'info');
}

function showPrivacy() {
    showMessage('Privacy Policy - Demo version', 'info');
}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
    <script src="js/api.js"></script>
</body>
</html>
